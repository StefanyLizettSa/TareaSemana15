spring.application.name=spsw
spring.config.import=optional:dotenv

# URL base de la API, se puede definir vía .env o variable de entorno API_URL
api.url=${API_URL:http://localhost:8080/api/personas}

# Configuración de H2 (base de datos en memoria)
spring.datasource.url=jdbc:h2:mem:personasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Consola H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
